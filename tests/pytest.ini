[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: 冒烟测试 - 快速验证核心功能
    regression: 回归测试 - 端到端业务流程验证
    api: 接口测试 - REST API 功能验证
    ui: UI测试 - 前端页面交互测试
    slow: 慢速测试 - 需要较长时间执行
    detection: 检测相关测试 - 需要模型支持
    training: 训练相关测试 - 需要GPU/大量资源

addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 环境变量
env =
    ASD_DEBUG=false
    CUDA_VISIBLE_DEVICES=-1

# 测试超时
timeout = 300
