        @keyframes wave {
            0%, 100% { transform: scaleY(0.6); opacity: 0.6; }
            50% { transform: scaleY(1); opacity: 0.9; }
        }

        /* 频谱圆环装饰 - 鼠标跟随 */
        .spectrum-ring {
            position: fixed;
            border-radius: 50%;
            border: 2px solid rgba(102, 126, 234, 0.3);
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease-out;
            z-index: 1;
        }

        .spectrum-ring.ring-1 {
            width: 200px;
            height: 200px;
            border-color: rgba(102, 126, 234, 0.4);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.2);
        }

        .spectrum-ring.ring-2 {
            width: 350px;
            height: 350px;
            border-color: rgba(118, 75, 162, 0.3);
            box-shadow: 0 0 40px rgba(118, 75, 162, 0.15);
        }

        .spectrum-ring.ring-3 {
            width: 500px;
            height: 500px;
            border-color: rgba(240, 147, 251, 0.2);
            box-shadow: 0 0 50px rgba(240, 147, 251, 0.1);
        }

        /* 内容区域 */
        .brand-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 500px;
        }

        .logo-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-icon svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        .brand-title {
            font-size: 42px;
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .brand-title span {
            background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: left;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 16px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .feature-icon svg {
            width: 20px;
            height: 20px;
            fill: #667eea;
        }

        /* 右侧登录区域 */
        .right-panel {
            width: 480px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            position: relative;
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a3e;
            margin-bottom: 10px;
        }

        .login-subtitle {
            font-size: 15px;
            color: #6b7280;
        }

        /* 登录表单 */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: #374151;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            color: #1f2937;
            transition: all 0.3s;
            background: #fafafa;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: #9ca3af;
            transition: fill 0.3s;
        }

        .form-input:focus + .input-icon {
            fill: #667eea;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            width: 20px;
            height: 20px;
            fill: #9ca3af;
            transition: fill 0.3s;
        }

        .password-toggle:hover {
            fill: #667eea;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4b5563;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
            cursor: pointer;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #764ba2;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .login-btn:active::after {
            width: 300px;
            height: 300px;
        }

        /* 分隔线 */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: #9ca3af;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        /* 其他登录方式 */
        .social-login {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            color: #4b5563;
            transition: all 0.3s;
        }

        .social-btn:hover {
            border-color: #667eea;
            background: #fafafa;
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        /* 注册链接 */
        .signup-link {
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: #6b7280;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: #764ba2;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .left-panel {
                display: none;
            }
            
            .right-panel {
                width: 100%;
                padding: 40px;
            }
        }

        @media (max-width: 480px) {
            .right-panel {
                padding: 24px;
            }
            
            .login-title {
                font-size: 24px;
            }
        }

        /* 加载动画 */
        .loading {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-btn.loading-state .btn-text {
            display: none;
        }

        .login-btn.loading-state .loading {
            display: block;
        }

        /* 错误提示 */
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message.show {
            display: flex;
        }

        .error-message svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
    </style>
</head>

                <label class="form-label">用户名</label>
                <div class="input-wrapper">
                    <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">密码</label>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                    <svg class="password-toggle" id="togglePassword" viewBox="0 0 24 24">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                </div>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn" style="margin-top: 10px;">
                <span class="btn-text">登 录</span>
                <div class="loading"></div>
            </button>
        </form>
    </div>

    <script>
        // 切换密码显示/隐藏
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // 切换图标
            this.innerHTML = type === 'password' 
                ? '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>'
                : '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
        });
        
        // 登录表单提交
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 显示加载状态
            loginBtn.classList.add('loading-state');
            loginBtn.disabled = true;
            errorMessage.classList.remove('show');
            
            // 模拟登录请求（实际项目中替换为真实API）
            setTimeout(() => {
                // 模拟验证 - 默认账号 admin / tp123456
                if (username === 'admin' && password === 'tp123456') {
                    // 登录成功
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('username', username);
                    
                    // 跳转到主页面
                    window.location.href = '/main';
                } else {
                    // 登录失败
                    loginBtn.classList.remove('loading-state');
                    loginBtn.disabled = false;
                    errorText.textContent = '用户名或密码错误';
                    errorMessage.classList.add('show');
                }
            }, 500);
        });
        
        // 页面加载时检查是否已登录
        window.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            if (isLoggedIn === 'true') {
                window.location.href = '/main';
            }
        });
        
        // 鼠标跟随效果 - 脉冲圆环
        const ring1 = document.querySelector('.ring-1');
        const ring2 = document.querySelector('.ring-2');
        const ring3 = document.querySelector('.ring-3');
        const rightPanel = document.querySelector('.right-panel');
        
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let ring1X = mouseX, ring1Y = mouseY;
        let ring2X = mouseX, ring2Y = mouseY;
        let ring3X = mouseX, ring3Y = mouseY;
        let isOverRightPanel = false;
        
        // 监听右侧登录面板鼠标进入/离开
        rightPanel.addEventListener('mouseenter', function() {
            isOverRightPanel = true;
        });
        
        rightPanel.addEventListener('mouseleave', function() {
            isOverRightPanel = false;
        });
        
        document.addEventListener('mousemove', function(e) {
            // 只有在非右侧登录面板区域才更新鼠标位置
            if (!isOverRightPanel) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });
        
        function animateRings() {
            // 第一个圆环 - 快速跟随
            ring1X += (mouseX - ring1X) * 0.15;
            ring1Y += (mouseY - ring1Y) * 0.15;
            ring1.style.left = ring1X + 'px';
            ring1.style.top = ring1Y + 'px';
            
            // 第二个圆环 - 中等延迟
            ring2X += (mouseX - ring2X) * 0.08;
            ring2Y += (mouseY - ring2Y) * 0.08;
            ring2.style.left = ring2X + 'px';
            ring2.style.top = ring2Y + 'px';
            
            // 第三个圆环 - 慢速跟随
            ring3X += (mouseX - ring3X) * 0.04;
            ring3Y += (mouseY - ring3Y) * 0.04;
            ring3.style.left = ring3X + 'px';
            ring3.style.top = ring3Y + 'px';
            
            requestAnimationFrame(animateRings);
        }
        
        animateRings();
        
        // 输入框聚焦时隐藏错误信息
        document.getElementById('username').addEventListener('input', function() {
            errorMessage.classList.remove('show');
        });
        
        document.getElementById('password').addEventListener('input', function() {
            errorMessage.classList.remove('show');
        });
    </script>
</body>
</html>
