# 算法统一配置文件
# 所有检测算法的配置、模型路径、阈值等在此管理

# 运行设备（固定为 cuda，启动时强制检查 CUDA 可用性）
device: "cuda"

pic_output_dir: "output/slices"

# 算法通用配置
algorithms:
  dinomaly_dinov3_small:
    name: "Dinomaly DINOv3 Small"
    type: "feature_based"
    input_size: [600, 600]
    thresholds:
      default: 0.033
      
  dinomaly_dinov3_large:
    name: "Dinomaly DINOv3 Large"
    type: "feature_based"
    input_size: [600, 600]
    thresholds:
      default: 0.033
      
  dinomaly_dinov2_small:
    name: "Dinomaly DINOv2 Small"
    type: "feature_based"
    input_size: [600, 600]
    thresholds:
      default: 0.02

  # Dinomaly2系列 (待官方代码发布)
  dinomaly2_dinov2_small:
    name: "Dinomaly2 DINOv2 Small"
    type: "feature_based"
    input_size: [600, 600]
    thresholds:
      default: 0.02

  dinomaly2_dinov2_base:
    name: "Dinomaly2 DINOv2 Base"
    type: "feature_based"
    input_size: [600, 600]
    thresholds:
      default: 0.02

  dinomaly2_dinov2_large:
    name: "Dinomaly2 DINOv2 Large"
    type: "feature_based"
    input_size: [600, 600]
    thresholds:
      default: 0.02

  # Dinomaly2 DINOv3系列
  dinomaly2_dinov3_small:
    name: "Dinomaly2 DINOv3 Small"
    type: "feature_based"
    input_size: [600, 600]
    thresholds:
      default: 0.02

  dinomaly2_dinov3_base:
    name: "Dinomaly2 DINOv3 Base"
    type: "feature_based"
    input_size: [600, 600]
    thresholds:
      default: 0.02

  dinomaly2_dinov3_large:
    name: "Dinomaly2 DINOv3 Large"
    type: "feature_based"
    input_size: [600, 600]
    thresholds:
      default: 0.02

  # ADer系列
  mambaad:
    name: "MambaAD"
    type: "state_space_model"
    thresholds:
      default: 0.5
      
  invad:
    name: "InVad"
    type: "generative"
    thresholds:
      default: 0.5
      
  vitad:
    name: "ViTAD"
    type: "transformer"
    thresholds:
      default: 0.5
      
  unad:
    name: "UniAD"
    type: "unified"
    thresholds:
      default: 0.5
      
  cflow:
    name: "CFlow"
    type: "flow_based"
    thresholds:
      default: 0.5
      
  pyramidflow:
    name: "PyramidFlow"
    type: "flow_based"
    thresholds:
      default: 0.5
      
  simplenet:
    name: "SimpleNet"
    type: "feature_learning"
    thresholds:
      default: 0.5

  destseg:
    name: "DeSTSeg"
    type: "segmentation"
    thresholds:
      default: 0.5

  realnet:
    name: "RealNet"
    type: "real_world"
    thresholds:
      default: 0.5

  rdpp:
    name: "RD++"
    type: "knowledge_distillation"
    thresholds:
      default: 0.5

  # DiAD
  diad:
    name: "DiAD"
    type: "diffusion"
    thresholds:
      default: 0.5

  # Anomalib系列
  patchcore:
    name: "PatchCore"
    type: "feature_embedding"
    thresholds:
      default: 0.5
      
  efficient_ad:
    name: "EfficientAd"
    type: "lightweight"
    thresholds:
      default: 0.5
      
  padim:
    name: "PaDiM"
    type: "feature_embedding"
    thresholds:
      default: 0.5

  # --- Anomalib v2.5.0 新增算法 ---
  anomalyvfm:
    name: "AnomalyVFM"
    type: "zero_shot"
    thresholds:
      default: 0.5

  cfm:
    name: "CFM"
    type: "cross_modal"
    thresholds:
      default: 0.5

  general_ad:
    name: "GeneralAD"
    type: "feature_embedding"
    thresholds:
      default: 0.5

  glass:
    name: "GLASS"
    type: "synthesis"
    thresholds:
      default: 0.5

  inp_former:
    name: "INP-Former"
    type: "prototype"
    thresholds:
      default: 0.5

  l2bt:
    name: "L2BT"
    type: "feature_embedding"
    thresholds:
      default: 0.5

  patchflow:
    name: "PatchFlow"
    type: "flow_based"
    thresholds:
      default: 0.5

  anomaly_dino:
    name: "AnomalyDINO"
    type: "few_shot"
    thresholds:
      default: 0.5

  # BaseASD系列
  denseae:
    name: "DenseAE"
    type: "autoencoder"
    thresholds:
      default: 0.5
      
  cae:
    name: "CAE"
    type: "autoencoder"
    thresholds:
      default: 0.5
      
  vae:
    name: "VAE"
    type: "autoencoder"
    thresholds:
      default: 0.5

  # MuSc系列 (零样本检测)
  # CLIP ViT-B系列 (小模型，更快)
  musc_clip_b32_512:
    name: "MuSc CLIP ViT-B/32@512px"
    type: "zero_shot"
    thresholds:
      default: 0.5

  musc_clip_b16_512:
    name: "MuSc CLIP ViT-B/16@512px"
    type: "zero_shot"
    thresholds:
      default: 0.5

  # CLIP ViT-L系列 (大模型，高精度)
  musc_clip_l14_336:
    name: "MuSc CLIP ViT-L/14@336px"
    type: "zero_shot"
    thresholds:
      default: 0.5

  musc_clip_l14_518:
    name: "MuSc CLIP ViT-L/14@518px"
    type: "zero_shot"
    thresholds:
      default: 0.5

  # DINOv2 ViT-B系列 (Base模型)
  musc_dinov2_b14_336:
    name: "MuSc DINOv2 ViT-B/14@336px"
    type: "zero_shot"
    thresholds:
      default: 0.5

  musc_dinov2_b14_518:
    name: "MuSc DINOv2 ViT-B/14@518px"
    type: "zero_shot"
    thresholds:
      default: 0.5

  # DINOv2 ViT-L系列 (Large模型)
  musc_dinov2_l14_336:
    name: "MuSc DINOv2 ViT-L/14@336px"
    type: "zero_shot"
    thresholds:
      default: 0.5

  musc_dinov2_l14_518:
    name: "MuSc DINOv2 ViT-L/14@518px"
    type: "zero_shot"
    thresholds:
      default: 0.5

  # SubspaceAD系列 (少样本检测)
  subspacead_dinov2_large_672:
    name: "SubspaceAD DINOv2-Large@672px"
    type: "few_shot"
    thresholds:
      default: 0.5

  subspacead_dinov2_large_518:
    name: "SubspaceAD DINOv2-Large@518px"
    type: "few_shot"
    thresholds:
      default: 0.5

  subspacead_dinov2_large_336:
    name: "SubspaceAD DINOv2-Large@336px"
    type: "few_shot"
    thresholds:
      default: 0.5

  subspacead_dinov2_base_672:
    name: "SubspaceAD DINOv2-Base@672px"
    type: "few_shot"
    thresholds:
      default: 0.5

  subspacead_dinov2_base_518:
    name: "SubspaceAD DINOv2-Base@518px"
    type: "few_shot"
    thresholds:
      default: 0.5

  subspacead_dinov2_small_672:
    name: "SubspaceAD DINOv2-Small@672px"
    type: "few_shot"
    thresholds:
      default: 0.5

# 模型权重路径配置 - 统一从 pre_trained 目录读取
models:
  # 预训练模型根目录
  pretrained_dir: "models/pre_trained"
  
  # Dinomaly 系列
  dinomaly:
    dinov3_small: "models/pre_trained/dinomaly_dinov3_small.pth"
    dinov3_base: "models/pre_trained/dinov3_vitb16_pretrain_lvd1689m-73cec8be.pth"
    dinov3_large: "models/pre_trained/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth"
    dinov2_small: "models/pre_trained/dinomaly_dinov2_small.pth"
    dinov2_base: "models/pre_trained/dinov2_vitb14_pretrain.pth"
    dinov2_large: "models/pre_trained/dinov2_vitl14_pretrain.pth"

  # Dinomaly2 系列 (DINOv2 with registers)
  dinomaly2:
    dinov2_small: "models/pre_trained/dinomaly2_dinov2_small.pth"
    dinov2_base: "models/pre_trained/dinomaly2_dinov2_base.pth"
    dinov2_large: "models/pre_trained/dinomaly2_dinov2_large.pth"
    dinov3_small: "models/pre_trained/dinomaly2_dinov3_small.pth"
    dinov3_base: "models/pre_trained/dinomaly2_dinov3_base.pth"
    dinov3_large: "models/pre_trained/dinomaly2_dinov3_large.pth"

  # ADer 系列
  mambaad:
    default: "models/pre_trained/mambaad_best.pth"
    
  invad:
    default: "models/pre_trained/invad_best.pth"
    
  vitad:
    default: "models/pre_trained/vitad_best.pth"
    
  unad:
    default: "models/pre_trained/unad_best.pth"
    
  cflow:
    default: "models/pre_trained/cflow_best.pth"
    
  pyramidflow:
    default: "models/pre_trained/pyramidflow_best.pth"
    
  simplenet:
    default: "models/pre_trained/simplenet_best.pth"

  destseg:
    default: "models/pre_trained/destseg_best.pth"

  realnet:
    default: "models/pre_trained/realnet_best.pth"

  rdpp:
    default: "models/pre_trained/rdpp_best.pth"

  # Anomalib 系列
  patchcore:
    default: "models/pre_trained/patchcore_best.pth"

  efficient_ad:
    default: "models/pre_trained/efficientad_best.pth"
    teacher_small: "models/pre_trained/efficientad_pretrained_weights/pretrained_teacher_small.pth"
    teacher_medium: "models/pre_trained/efficientad_pretrained_weights/pretrained_teacher_medium.pth"

  padim:
    default: "models/pre_trained/padim_best.pth"

  cfa:
    default: "models/pre_trained/cfa_best.pth"

  csflow:
    default: "models/pre_trained/csflow_best.pth"

  dfkde:
    default: "models/pre_trained/dfkde_best.pth"

  dfm:
    default: "models/pre_trained/dfm_best.pth"

  draem:
    default: "models/pre_trained/draem_best.pth"

  dsr:
    default: "models/pre_trained/dsr_best.pth"

  fastflow:
    default: "models/pre_trained/fastflow_best.pth"

  fre:
    default: "models/pre_trained/fre_best.pth"

  reverse_distillation:
    default: "models/pre_trained/reverse_distillation_best.pth"

  stfpm:
    default: "models/pre_trained/stfpm_best.pth"

  ganomaly:
    default: "models/pre_trained/ganomaly_best.pth"

  supersimplenet:
    default: "models/pre_trained/supersimplenet_best.pth"

  uflow:
    default: "models/pre_trained/uflow_best.pth"

  uninet:
    default: "models/pre_trained/uninet_best.pth"

  vlm_ad:
    default: "models/pre_trained/vlm_ad_best.pth"

  winclip:
    default: "models/pre_trained/winclip_best.pth"

  # Anomalib v2.5.0 新增模型
  anomalyvfm:
    default: "models/pre_trained/.placeholder"

  cfm:
    default: "models/pre_trained/.placeholder"

  general_ad:
    default: "models/pre_trained/.placeholder"

  glass:
    default: "models/pre_trained/.placeholder"

  inp_former:
    default: "models/pre_trained/.placeholder"

  l2bt:
    default: "models/pre_trained/.placeholder"

  patchflow:
    default: "models/pre_trained/.placeholder"

  anomaly_dino:
    default: "models/pre_trained/.placeholder"

  # MuSc 零样本检测系列
  musc:
    default: "models/pre_trained/.placeholder"  # 短名存根
    pretrained_models_dir: "models/pre_trained"
    # CLIP 模型
    ViT-B-32: "models/pre_trained/ViT-B-32.pt"
    ViT-B-16: "models/pre_trained/ViT-B-16.pt"
    ViT-L-14: "models/pre_trained/ViT-L-14.pt"
    ViT-L-14-336: "models/pre_trained/ViT-L-14-336px.pt"
    # DINOv2 模型
    dinov2_vits14: "models/pre_trained/dinov2_vits14_pretrain.pth"
    dinov2_vitb14: "models/pre_trained/dinov2_vitb14_pretrain.pth"
    dinov2_vitl14: "models/pre_trained/dinov2_vitl14_pretrain.pth"
    # Backbone详细配置
    backbones:
      # CLIP ViT-B系列
      ViT-B-32:
        img_resize: 512
        feature_layers: [2, 5, 8, 11]
        pretrained: openai
      ViT-B-16:
        img_resize: 512
        feature_layers: [2, 5, 8, 11]
        pretrained: openai
      # CLIP ViT-L系列
      ViT-L-14:
        img_resize: 518
        feature_layers: [5, 11, 17, 23]
        pretrained: openai
      ViT-L-14-336:
        img_resize: 336
        feature_layers: [5, 11, 17, 23]
        pretrained: openai
      # DINOv2 ViT-B系列
      dinov2_vitb14:
        img_resize: 518
        feature_layers: [2, 5, 8, 11]
        pretrained: laion400m_e31
      # DINOv2 ViT-L系列
      dinov2_vitl14:
        img_resize: 518
        feature_layers: [5, 11, 17, 23]
        pretrained: laion400m_e31
      # DINOv2 ViT-S系列
      dinov2_vits14:
        img_resize: 518
        feature_layers: [2, 5, 8, 11]
        pretrained: laion400m_e31
  
  # BaseASD 系列
  denseae:
    default: "models/pre_trained/denseae_best.pth"

  cae:
    default: "models/pre_trained/cae_best.pth"

  vae:
    default: "models/pre_trained/vae_best.pth"

  aegan:
    default: "models/pre_trained/aegan_best.pth"

  differnet:
    default: "models/pre_trained/differnet_best.pth"
    
  # ResNet 骨干网络
  resnet:
    resnet18: "models/pre_trained/resnet18-f37072fd.pth"
    wide_resnet50_2: "models/pre_trained/wide_resnet50_2-95faca4d.pth"

  # SubspaceAD 少样本检测系列
  # 使用 HuggingFace 的 DINOv2-with-registers 模型
  # 首次运行时自动下载并缓存到 models/pre_trained/huggingface/
  subspacead:
    default: "models/pre_trained/.placeholder"  # 短名存根
    dinov2-large-672: "models/pre_trained/dinov2_vitl14_reg4_pretrain.pth"
    dinov2-large-518: "models/pre_trained/dinov2_vitl14_reg4_pretrain.pth"
    dinov2-large-336: "models/pre_trained/dinov2_vitl14_reg4_pretrain.pth"
    dinov2-base-672: "models/pre_trained/dinov2_vitb14_reg4_pretrain.pth"
    dinov2-base-518: "models/pre_trained/dinov2_vitb14_reg4_pretrain.pth"
    dinov2-small-672: "models/pre_trained/dinov2_vits14_reg4_pretrain.pth"

  # SubspaceAD 详细变体 (作为独立算法条目，方便 factory 解析)
  subspacead_dinov2_large_672:
    default: "models/pre_trained/dinov2_vitl14_reg4_pretrain.pth"

  subspacead_dinov2_large_518:
    default: "models/pre_trained/dinov2_vitl14_reg4_pretrain.pth"

  subspacead_dinov2_large_336:
    default: "models/pre_trained/dinov2_vitl14_reg4_pretrain.pth"

  subspacead_dinov2_base_672:
    default: "models/pre_trained/dinov2_vitb14_reg4_pretrain.pth"

  subspacead_dinov2_base_518:
    default: "models/pre_trained/dinov2_vitb14_reg4_pretrain.pth"

  subspacead_dinov2_small_672:
    default: "models/pre_trained/dinov2_vits14_reg4_pretrain.pth"

  # MuSc 详细变体 (model_path 实际指向 backbone 权重文件)
  musc_clip_b32_512:
    default: "models/pre_trained/ViT-B-32.pt"

  musc_clip_b16_512:
    default: "models/pre_trained/ViT-B-16.pt"

  musc_clip_l14_336:
    default: "models/pre_trained/ViT-L-14-336px.pt"

  musc_clip_l14_518:
    default: "models/pre_trained/ViT-L-14.pt"

  musc_dinov2_b14_336:
    default: "models/pre_trained/dinov2_vitb14_pretrain.pth"

  musc_dinov2_b14_518:
    default: "models/pre_trained/dinov2_vitb14_pretrain.pth"

  musc_dinov2_l14_336:
    default: "models/pre_trained/dinov2_vitl14_pretrain.pth"

  musc_dinov2_l14_518:
    default: "models/pre_trained/dinov2_vitl14_pretrain.pth"

  # Other 存根算法 (other_adapters.py)
  # 这些是未实现的占位算法，推理时会报 NotImplementedError
  hiad:
    default: "models/pre_trained/.placeholder"

  multiads:
    default: "models/pre_trained/.placeholder"

  dictas:
    default: "models/pre_trained/.placeholder"

  diad:
    default: "algorithms/DiAD/models/diad.ckpt"

  audio_feature_cluster:
    default: "models/pre_trained/.placeholder"

# 推理配置
inference:
  device: "auto"  # auto, cuda, cpu
  batch_size: 1
  num_workers: 0
  
# 预处理配置
preprocessing:
  # 默认参考音频名称（Shazam模式下匹配数据库中的music_name）
  ref_file: "渡口片段"
  split_method: "shazam"  # shazam, mfcc_dtw, corr
  shazam:
    threshold: 5
    auto_match: false
    max_workers: 4  # 1为串行，>1启用并行
  output_size: [600, 600]
  sample_rate: 22050

# 模型架构详细配置
model_architectures:
  dinov2:
    weights_dir: "models/pre_trained"
    small:
      encoder_name: "dinov2reg_vit_small_14"
      target_layers: [2, 3, 4, 5, 6, 7, 8, 9]
      embed_dim: 384
      num_heads: 6
    base:
      encoder_name: "dinov2reg_vit_base_14"
      target_layers: [2, 3, 4, 5, 6, 7, 8, 9]
      embed_dim: 768
      num_heads: 12
    large:
      encoder_name: "dinov2reg_vit_large_14"
      target_layers: [4, 6, 8, 10, 12, 14, 16, 18]
      embed_dim: 1024
      num_heads: 16
  dinov3:
    weights_dir: "models/pre_trained"
    small:
      encoder_name: "dinov3_vits16"
      encoder_weight: "dinov3_vits16_pretrain_lvd1689m-08c60483.pth"
      target_layers: [2, 3, 4, 5, 6, 7, 8, 9]
      embed_dim: 384
      num_heads: 6
    base:
      encoder_name: "dinov3_vitb16"
      encoder_weight: "dinov3_vitb16_pretrain_lvd1689m-73cec8be.pth"
      target_layers: [2, 3, 4, 5, 6, 7, 8, 9]
      embed_dim: 768
      num_heads: 12
    large:
      encoder_name: "dinov3_vitl16"
      encoder_weight: "dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth"
      target_layers: [4, 6, 8, 10, 12, 14, 16, 18]
      embed_dim: 1024
      num_heads: 16

# 环境变量配置
environments:
  DINOMALY_ENCODER_DIR: "models/pre_trained"
  # CUDA_VISIBLE_DEVICES: 控制可见的 GPU 设备
  # - 不设置: 暴露所有 GPU（推荐，用户可在前端选择）
  # - "0": 只暴露 GPU 0
  # - "0,1,2": 暴露 GPU 0,1,2
  # CUDA_VISIBLE_DEVICES: "0"
  PRETRAINED_MODELS_DIR: "models/pre_trained"
  TORCH_HOME: "models/pre_trained"
  HF_HOME: "models/pre_trained/huggingface"
  TRANSFORMERS_CACHE: "models/pre_trained/huggingface"
  HUGGINGFACE_HUB_CACHE: "models/pre_trained/huggingface"
  OPEN_CLIP_CACHE_DIR: "models/pre_trained/open_clip"

# Python 虚拟环境配置
# 用于动态添加虚拟环境 site-packages 到 Python 路径
python_venv:
  # 虚拟环境根目录（相对于项目根目录）
  venv_dir: ".venv"
  # site-packages 路径模板，{python_version} 会被替换为实际 Python 版本
  site_packages_template: "lib/python{python_version}/site-packages"
  # 或者可以直接指定完整路径（优先级高于模板）
  # site_packages_path: ".venv/lib/python3.12/site-packages"
