    url: "facebook/dinov2-with-registers-small"
    local_path: "pre_trained/dinov2-with-registers-small"
    description: "DINOv2 Small with Registers - 改进版本，带寄存器令牌"
    size_mb: 88.0
    source: "huggingface"
    required: true
