    url: "https://dl.fbaipublicfiles.com/dinov2/dinov2_vitb14/dinov2_vitb14_pretrain.pth"
    local_path: "pre_trained/dinov2_vitb14_pretrain.pth"
    description: "DINOv2 ViT-B/14 预训练权重 - 用于Dinomaly (86M参数)"
    size_mb: 330.0
