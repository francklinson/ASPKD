# ASD_for_SPK 项目预训练模型配置
# 该文件定义了项目所需的所有预训练模型及其下载配置

# 预训练模型根目录
pretrained_dir: "pre_trained"

# 模型下载配置
models:
  # ==================== SubspaceAD / DINOv2 模型 ====================
  # 用于少样本异常检测的特征提取器
  dinov2-small:
    name: "dinov2-small"
    url: "facebook/dinov2-small"
    local_path: "pre_trained/dinov2-small"
    description: "DINOv2 Small - 用于SubspaceAD少样本检测的轻量级特征提取器 (22M参数)"
    size_mb: 88.0
    source: "huggingface"
    required: true
    dependencies:
      - "transformers>=4.35.0"
      - "torch>=2.1.0"
    usage:
      - "SubspaceAD少样本异常检测"
      - "轻量级场景，推理速度快"
    load_params:
      model_type: "AutoModel"
      trust_remote_code: false
      local_files_only: true

  dinov2-base:
    name: "dinov2-base"
    url: "facebook/dinov2-base"
    local_path: "pre_trained/dinov2-base"
    description: "DINOv2 Base - 用于SubspaceAD少样本检测的基础特征提取器 (86M参数)"
    size_mb: 330.0
    source: "huggingface"
    required: true
    dependencies:
      - "transformers>=4.35.0"
      - "torch>=2.1.0"
    usage:
      - "SubspaceAD少样本异常检测"
      - "平衡精度和速度"
    load_params:
      model_type: "AutoModel"
      trust_remote_code: false
      local_files_only: true

  dinov2-large:
    name: "dinov2-large"
    url: "facebook/dinov2-large"
    local_path: "pre_trained/dinov2-large"
    description: "DINOv2 Large - 用于SubspaceAD少样本检测的高精度特征提取器 (300M参数)"
    size_mb: 1150.0
    source: "huggingface"
    required: true
    dependencies:
      - "transformers>=4.35.0"
      - "torch>=2.1.0"
    usage:
      - "SubspaceAD少样本异常检测"
      - "高精度场景"
    load_params:
      model_type: "AutoModel"
      trust_remote_code: false
      local_files_only: true

  dinov2-with-registers-small:
