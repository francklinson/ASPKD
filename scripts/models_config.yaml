      - "timm==0.9.12"
      - "torch>=2.1.0"
    usage:
      - "MuSc零样本检测"
      - "高效推理"
    load_params:
      model_type: "timm"
      pretrained: true

# 下载脚本配置
download:
  # 并发下载数
  max_workers: 2
  # 下载超时（秒）
  timeout: 300
  # 重试次数
  max_retries: 3
  # 断点续传块大小（字节）
  chunk_size: 8192
  # 是否验证完整性
  verify_integrity: true
  # 允许的大小误差（比例）
  size_tolerance: 0.1

# 环境变量配置
environments:
  # HuggingFace缓存目录
  HF_HOME: "pre_trained/huggingface"
  TRANSFORMERS_CACHE: "pre_trained/huggingface"
  HUGGINGFACE_HUB_CACHE: "pre_trained/huggingface"
  # PyTorch缓存目录
  TORCH_HOME: "pre_trained"
  # timm缓存目录
  TIMM_CACHE: "pre_trained/timm"
