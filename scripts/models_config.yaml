      - "高精度特征提取"
    load_params:
      model_type: "torch"
      map_location: "cpu"

  # ==================== timm 模型 (通过timm自动下载) ====================
  # 这些模型由timm库自动管理，但我们需要记录它们
  timm-resnet200:
    name: "timm-resnet200"
    url: "timm/resnet200"
    local_path: "pre_trained/timm/resnet200"
    description: "ResNet-200 - 用于MuSc的深层骨干网络 (64.7M参数)"
    size_mb: 250.0
    source: "timm"
    required: false
    dependencies:
      - "timm==0.9.12"
      - "torch>=2.1.0"
    usage:
