      local_files_only: true

  dinov2-with-registers-large:
    name: "dinov2-with-registers-large"
    url: "facebook/dinov2-with-registers-large"
    local_path: "pre_trained/dinov2-with-registers-large"
    description: "DINOv2 Large with Registers - 改进版本，高精度特征提取器"
    size_mb: 1150.0
    source: "huggingface"
    required: true
    dependencies:
      - "transformers>=4.35.0"
      - "torch>=2.1.0"
    usage:
      - "SubspaceAD少样本异常检测（推荐）"
      - "最高精度场景"
    load_params:
      model_type: "AutoModel"
      trust_remote_code: false
      local_files_only: true

  dinov2-with-registers-giant:
    name: "dinov2-with-registers-giant"
    url: "facebook/dinov2-with-registers-giant"
    local_path: "pre_trained/dinov2-with-registers-giant"
    description: "DINOv2 Giant with Registers - 最高精度特征提取器 (1.1B参数)"
    size_mb: 2300.0
    source: "huggingface"
    required: false
    dependencies:
