      local_files_only: true

  dinov2-with-registers-base:
    name: "dinov2-with-registers-base"
    url: "facebook/dinov2-with-registers-base"
    local_path: "pre_trained/dinov2-with-registers-base"
    description: "DINOv2 Base with Registers - 改进版本，带寄存器令牌"
    size_mb: 330.0
    source: "huggingface"
    required: true
    dependencies:
      - "transformers>=4.35.0"
      - "torch>=2.1.0"
    usage:
      - "SubspaceAD少样本异常检测"
