  # ==================== Dinomaly DINOv2 模型 ====================
  # 用于Dinomaly异常检测
  dinov2-vits14-pretrain:
    name: "dinov2-vits14-pretrain"
    url: "https://dl.fbaipublicfiles.com/dinov2/dinov2_vits14/dinov2_vits14_pretrain.pth"
    local_path: "pre_trained/dinov2_vits14_pretrain.pth"
    description: "DINOv2 ViT-S/14 预训练权重 - 用于Dinomaly (22M参数)"
    size_mb: 88.0
    source: "direct"
    required: true
    dependencies:
      - "torch>=2.1.0"
      - "timm==0.9.12"
    usage:
      - "Dinomaly异常检测"
      - "轻量级场景"
    load_params:
      model_type: "torch"
      map_location: "cpu"

  dinov2-vitb14-pretrain:
