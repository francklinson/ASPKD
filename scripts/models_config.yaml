  # ==================== ResNet 骨干网络 ====================
  # 用于多种算法的骨干网络
  resnet18:
    name: "resnet18"
    url: "https://download.pytorch.org/models/resnet18-f37072fd.pth"
    local_path: "pre_trained/resnet18-f37072fd.pth"
    description: "ResNet-18 预训练权重 - 用于轻量级特征提取 (11M参数)"
    size_mb: 45.0
    source: "direct"
    required: true
    dependencies:
      - "torch>=2.1.0"
      - "torchvision>=0.16.0"
    usage:
      - "PatchCore骨干网络"
      - "PaDiM骨干网络"
      - "轻量级特征提取"
    load_params:
      model_type: "torch"
      map_location: "cpu"

  wide-resnet50-2:
    name: "wide-resnet50-2"
    url: "https://download.pytorch.org/models/wide_resnet50_2-95faca4d.pth"
    local_path: "pre_trained/wide_resnet50_2-95faca4d.pth"
    description: "Wide ResNet-50-2 预训练权重 - 用于PatchCore等算法 (68.9M参数)"
    size_mb: 132.0
    source: "direct"
    required: true
