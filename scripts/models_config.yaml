    url: "openai/ViT-B-32"
    local_path: "pre_trained/ViT-B-32.pt"
    description: "CLIP ViT-B/32 - 用于MuSc零样本检测的基础模型 (149M参数)"
    size_mb: 340.0
    source: "open_clip"
    required: true
    dependencies:
      - "open_clip_torch"
      - "torch>=2.1.0"
    usage:
      - "MuSc零样本异常检测"
      - "快速推理场景"
    load_params:
      model_type: "open_clip"
      pretrained: "openai"

  clip-vit-b-16:
    name: "clip-vit-b-16"
